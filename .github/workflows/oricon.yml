name: oricon

on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      ORICON_NEWS_ID:
        description: 'ORICON_NEWS_ID'
        required: true
        type: string


jobs:
  oricon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8' # Specify the Python version you need
    
      - name: Run apt and pip
        run: |
          sudo apt update
          pip install requests
          pip install bs4
          pip install lxml

      - name: Run Python script
        run: |
          python mdpr.py
        env:
          TELEGRAM_CHAT_ID: '-1002646331785'
          TELEGRAM_THREAD_ID: '4812'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ORICON_NEWS_ID: ${{ inputs.ORICON_NEWS_ID }} 
